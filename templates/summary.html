<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Summary – SmartStudy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body{
    background: linear-gradient(135deg, #020617, #0f172a);
    min-height:100vh; display:flex; justify-content:center; align-items:flex-start;
    padding:30px 20px; color:white;
}
.container{
    width:90%; max-width:860px;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(12px);
    border-radius:25px; padding:40px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
}
.logo{ font-size:3rem; text-align:center; margin-bottom:8px; }
h1{ text-align:center; font-size:2.2rem; margin-bottom:6px; }
.tagline{ text-align:center; color:#94a3b8; margin-bottom:10px; font-size:0.9rem; }
.pdf-badge{ text-align:center; color:#38bdf8; font-size:0.85rem; margin-bottom:25px; }
.summary-box{
    background:rgba(255,255,255,0.06);
    border-radius:20px; padding:30px;
    font-size:1rem; color:#e2e8f0; line-height:1.8;
}
/* Render markdown nicely */
.summary-box h2{ color:#7dd3fc; font-size:1.15rem; margin:20px 0 8px; border-bottom:1px solid rgba(125,211,252,0.2); padding-bottom:6px; }
.summary-box h3{ color:#a5b4fc; font-size:1rem; margin:16px 0 6px; }
.summary-box ul{ padding-left:20px; margin:8px 0; }
.summary-box li{ margin:5px 0; }
.summary-box strong{ color:#fbbf24; }
.summary-box p{ margin:8px 0; }
.no-pdf{ text-align:center; color:#94a3b8; font-size:1rem; padding:40px 0; }
.actions{ display:flex; gap:12px; margin-top:25px; flex-wrap:wrap; justify-content:center; }
.btn{
    display:inline-block; text-decoration:none; padding:12px 22px;
    border-radius:12px; font-weight:600; font-size:0.9rem; transition:0.3s;
}
.btn-primary{ background:linear-gradient(135deg,#38bdf8,#6366f1); color:white; }
.btn-secondary{ background:rgba(255,255,255,0.1); color:#e2e8f0; border:1px solid rgba(255,255,255,0.15); }
.btn:hover{ transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div class="container">
    <div class="logo">✨</div>
    <h1>AI Summary</h1>
    <p class="tagline">Smart AI-Generated Notes</p>

    {% if pdf_filename %}
    <p class="pdf-badge">📄 {{ pdf_filename }}</p>
    {% endif %}

    <div class="summary-box">
        {% if summary %}
        <div id="summaryContent"></div>
        <script>
            const raw = {{ summary | tojson }};
            document.getElementById('summaryContent').innerHTML = marked.parse(raw);
        </script>
        {% else %}
        <div class="no-pdf">
            <p>📭 No summary yet.</p>
            <p style="margin-top:8px;font-size:0.85rem;">Upload a PDF from the home page to generate a summary.</p>
        </div>
        {% endif %}
    </div>

    <div class="actions">
        <a href="/chat" class="btn btn-secondary">🤖 Ask AI Tutor</a>
        <a href="/writer" class="btn btn-secondary">🧾 AI Writer</a>
        <a href="/" class="btn btn-primary">📤 Upload Another PDF</a>
    </div>
</div>
</body>
</html>
